name: Update Leaderboard

on:
  schedule:
    # Runs every hour at :00. 744 runs/month × ~20s ≈ 248 min/month (well within free tier).
    - cron: "0 * * * *"
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch and rank
        run: python fetch_and_rank.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranked_results.json data/submissions_raw.json data/team_names.json
          if git diff --cached --quiet; then
            echo "No changes to leaderboard data — skipping commit."
          else
            git commit -m "chore: refresh leaderboard data [skip ci]"
            git push
          fi
